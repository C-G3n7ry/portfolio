<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="g3n7ry">
  <rect width="64" height="64" rx="14" fill="#0a0a0c"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#29272f" stroke-width="1"/>
  <!-- amber phosphor 'g' mark -->
  <text x="50%" y="50%" dy="0.04em" text-anchor="middle" dominant-baseline="central"
        font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="700"
        font-size="34" fill="#f0a93b">g</text>
  <!-- blinking cursor block -->
  <rect x="40" y="20" width="8" height="24" rx="1" fill="#f0a93b">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
